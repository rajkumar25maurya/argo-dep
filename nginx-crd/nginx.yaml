apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-crd-app
  namespace: nginx-crd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-crd-app
  template:
    metadata:
      labels:
        app: nginx-crd-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80